name: DrawForge CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          cache-dependency-path: |
            user-ui/package-lock.json
            server/package-lock.json

      - name: Install dependencies (server)
        run: npm ci
        working-directory: ./server

      - name: Install dependencies (user-ui)
        run: npm ci
        working-directory: ./user-ui

      - name: Lint user-ui
        run: npm run lint
        working-directory: ./user-ui

      - name: Build user-ui
        run: npm run build
        working-directory: ./user-ui
